<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LootLizard — Never Forget Where You Found It</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="images/logo.svg" alt="LootLizard" width="36" height="36">
        <span>LootLizard</span>
      </a>
      <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#screenshots">Screenshots</a>
        <a href="#download">Download</a>
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
      </div>
    </div>
  </nav>

  <section id="hero" class="section">
    <div class="container hero-content">
      <div class="hero-text">
        <h1>Never forget where you found it.</h1>
        <p class="hero-subtitle">LootLizard is the metal detecting companion app that logs your finds, tracks your hunts, and remembers every location.</p>
        <div class="store-buttons">
          <a href="#" class="store-badge google-play">
            <span>GET IT ON</span>
            <strong>Google Play</strong>
          </a>
          <a href="#" class="store-badge app-store">
            <span>Download on the</span>
            <strong>App Store</strong>
          </a>
        </div>
      </div>
      <div class="hero-phone">
        <div class="phone-frame">
          <img src="images/dashboard.jpg" alt="LootLizard Dashboard" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
